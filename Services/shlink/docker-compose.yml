services:
  shlink-database:
    image: postgres:16
    container_name: shlink-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: shlink
      POSTGRES_PASSWORD: shlink1234
      POSTGRES_DB: shlink
    volumes:
      - ../../Volumes/shlink/db:/var/lib/postgresql/data
  shlink:
    image: shlinkio/shlink:stable
    container_name: shlink
    restart: unless-stopped
    #network_mode: bridge
    ports:
      - 9330:8080
    environment:
      DB_DRIVER: postgres
      DB_NAME: shlink
      DB_USER: shlink
      DB_PASSWORD: shlink1234
      DB_HOST: shlink-database
      DB_PORT: 5432
    env_file:
      - ../../Volumes/shlink/.env
  shlink-web:
    image: shlinkio/shlink-web-client
    container_name: shlink-web
    restart: unless-stopped
    network_mode: bridge
    ports:
      - 9331:8080
    volumes:
      - ../../Volumes/shlink/servers.json:/usr/share/nginx/html/servers.json
