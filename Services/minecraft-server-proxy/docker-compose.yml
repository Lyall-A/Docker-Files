services:
  minecraft-server-proxy:
    image: alpine/socat
    container_name: minecraft-server-proxy
    restart: unless-stopped
    network_mode: bridge
    ports:
      - 25565:25565
    env_file:
      - ../../Volumes/minecraft-server-proxy/.env
    command: -d -d TCP4-LISTEN:25565,reuseaddr,fork TCP4:$TARGET_HOST:25565

